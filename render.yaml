services:
  - type: web
    name: model-generator
    runtime: node
    rootDir: .
    buildCommand: cd frontend && npm install && npm run build && cp -r dist ../backend/public
    startCommand: cd backend && npm install && node server.js
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://47claude.com/v1
      - key: IMAGE_MODEL
        value: gpt-image2
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/models
